title: New Account Created and Added to Privileged Group
id: 65f4a3d6-302d-42df-950a-cc6fd81f2f11
status: experimental
description: >
    Detects creation of a new user account (Event ID 4720) closely followed by
    that principal granting group membership (Event ID 4728) — a persistence /
    privilege-escalation pattern, especially when performed by a recently
    compromised admin.
references:
    - https://attack.mitre.org/techniques/T1136/001/
    - https://attack.mitre.org/techniques/T1098/
author: Harsh Gupta (SentinelOps)
date: 2026-06-24
tags:
    - attack.persistence
    - attack.t1136.001
    - attack.privilege_escalation
    - attack.t1098
logsource:
    product: windows
    service: security
detection:
    create_user:
        extra.event_id: 4720
    add_to_group:
        extra.event_id: 4728
    condition: create_user or add_to_group
fields:
    - user.name
    - host.name
falsepositives:
    - Legitimate IT onboarding / joiner-mover-leaver automation
    - Identity-management tooling provisioning service accounts
level: medium
