# SentinelOps Wazuh dashboard config.
#
# Overrides the image default opensearch_dashboards.yml, which points at
# https://localhost:9200 (wrong in a multi-container stack) and reads its certs
# from /etc/wazuh-dashboard/certs (a path that, when bind-mounted, clobbers the
# keystore directory). Here the indexer host is the compose service name and the
# certs are read from /usr/share/wazuh-dashboard/certs.
server.host: 0.0.0.0
server.port: 5601
opensearch.hosts: https://wazuh.indexer:9200
opensearch.ssl.verificationMode: certificate
opensearch.requestHeadersAllowlist: ["securitytenant","Authorization"]
opensearch_security.multitenancy.enabled: false
opensearch_security.readonly_mode.roles: ["kibana_read_only"]
server.ssl.enabled: true
server.ssl.key: "/usr/share/wazuh-dashboard/certs/dashboard-key.pem"
server.ssl.certificate: "/usr/share/wazuh-dashboard/certs/dashboard.pem"
opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-dashboard/certs/root-ca.pem"]
uiSettings.overrides.defaultRoute: /app/wz-home
