---
# SentinelOps internal user database for the Wazuh indexer.
#
# Derived from the Wazuh indexer image default, with the `admin` and
# `kibanaserver` password hashes replaced so the indexer honours the
# credentials defined in docker/.env (INDEXER_PASSWORD and DASHBOARD_PASSWORD).
#
# Regenerate a hash with:
#   docker compose exec wazuh.indexer \
#     /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh -p '<password>'
# then re-run the securityadmin step (./bringup.sh re-runs it, or see README).

_meta:
  type: "internalusers"
  config_version: 2

# admin -> INDEXER_PASSWORD (used by the manager/filebeat and admin CLI access)
admin:
  hash: "$2y$12$/IcujCufSqVvbT7zgInSd.m3oBoT8vK8ZMXcGmUEY3eIZ43mi8VyG"
  reserved: true
  backend_roles:
  - "admin"
  description: "SentinelOps admin user"

anomalyadmin:
  hash: "$2y$12$TRwAAJgnNo67w3rVUz4FIeLx9Dy/llB79zf9I15CKJ9vkM4ZzAd3."
  reserved: false
  opendistro_security_roles:
  - "anomaly_full_access"
  description: "Demo anomaly admin user, using internal role"

# kibanaserver -> DASHBOARD_PASSWORD (the dashboard authenticates to the indexer
# as this user; the entrypoint loads it from DASHBOARD_USERNAME/DASHBOARD_PASSWORD)
kibanaserver:
  hash: "$2y$12$qj8fdX.mf.LneD0gHATL4OoBjObPas/o2ubpkFEdKpNtZ8WHv.qoy"
  reserved: true
  description: "SentinelOps OpenSearch Dashboards user"

kibanaro:
  hash: "$2a$12$JJSXNfTowz7Uu5ttXfeYpeYE0arACvcwlPBStB1F.MI7f0U9Z4DGC"
  reserved: false
  backend_roles:
  - "kibanauser"
  - "readall"
  attributes:
    attribute1: "value1"
    attribute2: "value2"
    attribute3: "value3"
  description: "Demo read only user, using external role mapping"

logstash:
  hash: "$2a$12$u1ShR4l4uBS3Uv59Pa2y5.1uQuZBrZtmNfqB3iM/.jL0XoV9sghS2"
  reserved: false
  backend_roles:
  - "logstash"
  description: "Demo logstash user, using external role mapping"

readall:
  hash: "$2a$12$ae4ycwzwvLtZxwZ82RmiEunBbIPiAmGZduBAjKN0TXdwQFtCwARz2"
  reserved: false
  backend_roles:
  - "readall"
  description: "Demo readall user, using external role mapping"

snapshotrestore:
  hash: "$2y$12$DpwmetHKwgYnorbgdvORCenv4NAK8cPUg8AI6pxLCuWf/ALc0.v7W"
  reserved: false
  backend_roles:
  - "snapshotrestore"
  description: "Demo snapshotrestore user, using external role mapping"
